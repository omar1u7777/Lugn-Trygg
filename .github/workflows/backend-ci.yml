name: Backend CI

on:
  push:
    branches: [master]
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./Backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libsndfile1
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock ruff

      - name: Ruff lint
        run: ruff check src --output-format=github

      - name: Run tests
        env:
          FLASK_ENV: testing
          FLASK_TESTING: 'true'
          JWT_SECRET_KEY: ci-test-secret-key-that-is-at-least-32-chars-long
          JWT_REFRESH_SECRET_KEY: ci-test-refresh-key-that-is-at-least-32-chars-long
          FIREBASE_WEB_API_KEY: ci-test-firebase-web-api-key
          FIREBASE_API_KEY: ci-test-firebase-api-key
          FIREBASE_PROJECT_ID: ci-test-project
          FIREBASE_STORAGE_BUCKET: ci-test-project.appspot.com
          HIPAA_ENCRYPTION_KEY: yTOVpH-x9W3qRUbzBJ4pLBYCKMu5kkC-asbcsfuHvmo=
          FIREBASE_CREDENTIALS: '{"type":"service_account","project_id":"ci-test","private_key_id":"key","private_key":"stub-key-for-ci-testing-only","client_email":"ci@ci-test.iam.gserviceaccount.com","client_id":"123","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token"}'
        run: pytest --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=60 --tb=short -q

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: Backend/coverage.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always() && env.CODECOV_TOKEN != ''
        continue-on-error: true
        with:
          files: ./Backend/coverage.xml
          flags: backend
          token: ${{ env.CODECOV_TOKEN }}
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Backend/requirements.txt

      - name: Bandit security scan
        run: |
          pip install bandit
          bandit -r Backend/src -ll -f json -o bandit-report.json
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: './Backend'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          exit-code: '0'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-backend.sarif'

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --redact

  check-e2e-secrets:
    runs-on: ubuntu-latest
    needs: lint-and-test
    outputs:
      has_secrets: ${{ steps.check.outputs.has_secrets }}
    steps:
      - name: Check required e2e secrets
        id: check
        env:
          FB_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FB_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
        run: |
          if [ -n "$FB_JSON" ] && [ -n "$FB_KEY" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

  live-e2e-production-like:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint-and-test, check-e2e-secrets]
    if: needs.check-e2e-secrets.outputs.has_secrets == 'true'
    defaults:
      run:
        working-directory: ./Backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libsndfile1 curl
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Firebase service account file from secret
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > serviceAccountKey.json
          python -c "import json; json.load(open('serviceAccountKey.json', 'r', encoding='utf-8')); print('serviceAccountKey.json validated')"

      - name: Start production-like Waitress server
        env:
          FLASK_ENV: production
          FLASK_DEBUG: 'false'
          HOST: 127.0.0.1
          PORT: 5003
          WAITRESS_THREADS: 4
          WEBAUTHN_RP_ID: lugn-trygg-ci.local
          WEBAUTHN_ORIGIN: https://lugn-trygg-ci.local
          JWT_SECRET_KEY: ci-production-jwt-secret-key-that-is-intentionally-longer-than-sixty-four-characters
          JWT_REFRESH_SECRET_KEY: ci-production-refresh-secret-key-that-is-also-longer-than-sixty-four-characters
          PYTHONPATH: ${{ github.workspace }}/Backend
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/Backend/serviceAccountKey.json
          FIREBASE_CREDENTIALS: ${{ github.workspace }}/Backend/serviceAccountKey.json
          FIREBASE_CREDENTIALS_PATH: ${{ github.workspace }}/Backend/serviceAccountKey.json
          SERVICE_ACCOUNT_PATH: ${{ github.workspace }}/Backend/serviceAccountKey.json
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          TF_CPP_MIN_LOG_LEVEL: '3'
        run: |
          nohup python -m waitress --host=127.0.0.1 --port=5003 main:app > waitress.log 2>&1 &

      - name: Wait for production-like server health
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5003/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become healthy in time"
          cat waitress.log || true
          exit 1

      - name: Run live mood tracking E2E
        env:
          BACKEND_URL: http://127.0.0.1:5003
          SERVICE_ACCOUNT_PATH: ${{ github.workspace }}/Backend/serviceAccountKey.json
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
        run: python e2e_live_test.py

      - name: Upload production-like server log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-waitress-log
          path: Backend/waitress.log
          if-no-files-found: ignore
          retention-days: 7
