name: Frontend CI

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tsconfig*.json'
      - 'tailwind.config.*'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --run --coverage --pool=forks --maxWorkers=1
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          VITE_ENCRYPTION_KEY: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2 # gitleaks:allow
          VITE_FIREBASE_API_KEY: ci-test-api-key
          VITE_FIREBASE_AUTH_DOMAIN: ci-test.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-test-project
          VITE_FIREBASE_STORAGE_BUCKET: ci-test-project.appspot.com

      - name: Check coverage threshold (60%)
        run: |
          node -e "
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json','utf8'));
            const lines = summary.total.lines.pct;
            const branches = summary.total.branches.pct;
            const functions = summary.total.functions.pct;
            const statements = summary.total.statements.pct;
            console.log('Coverage: lines='+lines+'% branches='+branches+'% functions='+functions+'% statements='+statements+'%');
            const threshold = 60;
            if (lines < threshold || branches < threshold || functions < threshold || statements < threshold) {
              console.error('FAILED: One or more metrics are below the '+threshold+'% threshold.');
              process.exit(1);
            }
            console.log('Coverage thresholds passed.');
          "

      - name: Production build
        run: npm run build

      - name: Validate build artifact
        run: |
          if [ ! -f dist/index.html ]; then
            echo "ERROR: dist/index.html not found — build produced an empty or broken dist/"
            exit 1
          fi
          echo "Build artifact verified: dist/index.html exists"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always() && env.CODECOV_TOKEN != ''
        continue-on-error: true
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          token: ${{ env.CODECOV_TOKEN }}
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm audit
        run: npm audit --omit=dev --audit-level=high

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-frontend.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-frontend.sarif'

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --redact
