title = "Lugn-Trygg gitleaks configuration"

[extend]
# Extend the default ruleset
useDefault = true

[allowlist]
  description = "CI/CD test credentials, test fixtures, and example files — not real secrets"
  paths = [
    # Manual test HTML pages contain intentionally fake test keys
    '''tests/manual/''',
    # Vitest config uses fake hex keys for test environment defines
    '''vitest\.config\.ts''',
    # .env.example files contain placeholder values by design
    '''\.env\.example$''',
    # Backend venv contains third-party package source with test vectors
    '''Backend/venv/''',
    # GitHub Actions workflow files use clearly-labelled CI test credentials
    '''\.github/workflows/''',
    # Backend test suite — uses fake/stub Firebase keys and tokens
    '''Backend/tests/''',
    # Backend scripts — OpenAPI docs use example JWT illustrative values
    '''Backend/scripts/''',
    # k8s example files — placeholder values, not real secrets
    '''k8s/secrets\.example\.yaml''',
    # Frontend e2e tests — intentionally invalid/expired JWT test tokens
    '''tests/e2e/''',
  ]
