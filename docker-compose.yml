services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: lugn-trygg-backend
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: production
      PORT: 5001
      REDIS_URL: redis://redis:6379/0
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase_credentials.json
    env_file:
      - Backend/.env
    volumes:
      - ${FIREBASE_CREDENTIALS_HOST_PATH:?Set FIREBASE_CREDENTIALS_HOST_PATH}:/run/secrets/firebase_credentials.json:ro
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://backend:5001}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID:-}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY:-}
        VITE_ENCRYPTION_KEY: ${VITE_ENCRYPTION_KEY:-}
        VITE_DASHBOARD_HERO_PUBLIC_ID: ${VITE_DASHBOARD_HERO_PUBLIC_ID:-}
        VITE_WELLNESS_HERO_PUBLIC_ID: ${VITE_WELLNESS_HERO_PUBLIC_ID:-}
        VITE_JOURNAL_HERO_PUBLIC_ID: ${VITE_JOURNAL_HERO_PUBLIC_ID:-}
        VITE_ONBOARDING_HERO_PUBLIC_ID: ${VITE_ONBOARDING_HERO_PUBLIC_ID:-}
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME:-}
        VITE_CLOUDINARY_UPLOAD_PRESET: ${VITE_CLOUDINARY_UPLOAD_PRESET:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_VERCEL_ANALYTICS_ID: ${VITE_VERCEL_ANALYTICS_ID:-}
        VITE_ENABLE_WEB_VITALS: ${VITE_ENABLE_WEB_VITALS:-true}
        VITE_FORCE_ANALYTICS: ${VITE_FORCE_ANALYTICS:-false}
        VITE_ENABLE_PERFORMANCE_MONITORING: ${VITE_ENABLE_PERFORMANCE_MONITORING:-true}
        VITE_ENABLE_CORE_WEB_VITALS: ${VITE_ENABLE_CORE_WEB_VITALS:-true}
        VITE_ENABLE_USER_TIMING: ${VITE_ENABLE_USER_TIMING:-true}
    container_name: lugn-trygg-frontend
    ports:
      - "3000:8080"
    # NOTE: Vite bakes VITE_* vars at build time (via ARGs above).
    # Runtime environment vars are NOT read by the SPA bundle.
    environment:
      NODE_ENV: production
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: lugn-trygg-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    environment:
      - REDISCLI_AUTH=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_network

volumes:
  redis_data:

networks:
  app_network:
    driver: bridge