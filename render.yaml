services:
  - type: web
    name: lugn-trygg-backend
    runtime: python
    pythonVersion: 3.11
    plan: starter

    repo: https://github.com/omar1u7777/Lugn-Trygg
    branch: master

    rootDir: Backend

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn_config.py main:app

    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
      - key: PYTHONUNBUFFERED
        value: "True"
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_REFRESH_SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_CREDENTIALS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Azure OpenAI (alternative - uncomment if using Azure instead of OpenAI)
      # - key: AZURE_OPENAI_API_KEY
      #   sync: false
      # - key: AZURE_OPENAI_ENDPOINT
      #   sync: false
      # - key: AZURE_OPENAI_API_VERSION
      #   value: "2024-02-15-preview"
      # - key: AZURE_OPENAI_DEPLOYMENT
      #   value: "gpt-4o-mini"
      - key: SENTRY_DSN
        sync: false
      - key: PORT
        sync: false
      - key: GUNICORN_WORKERS
        value: "1"
      - key: GUNICORN_THREADS
        value: "2"
